<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buscador de precios con IVA | Stockin Lavanda</title>
  <style>
    :root {
      --fondo: #faf7fb;
      --tarjeta: #ffffff;
      --texto: #241d2b;
      --suave: #74677d;
      --linea: #eadff1;
      --lavanda: #8f5cad;
      --lavanda-claro: #f3e9f8;
      --sombra: 0 12px 34px rgba(68, 42, 90, .10);
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--fondo); color: var(--texto); }
    main { width: min(900px, calc(100% - 28px)); margin: 0 auto; padding: 36px 0 44px; }
    header { text-align: center; margin-bottom: 24px; }
    .logo-empresa { display: block; max-width: min(520px, 92%); width: 100%; height: auto; margin: 0 auto 12px; }
    h1 { margin: 0; font-size: clamp(28px, 4vw, 42px); line-height: 1.1; }
    .buscador { background: var(--tarjeta); border: 1px solid var(--linea); border-radius: 24px; padding: 18px; box-shadow: var(--sombra); position: sticky; top: 12px; z-index: 2; }
    label { display: block; font-size: 14px; font-weight: 700; color: var(--suave); margin: 0 0 9px 3px; }
    input { width: 100%; border: 2px solid var(--linea); border-radius: 18px; padding: 17px 18px; font-size: 18px; outline: none; background: #fff; color: var(--texto); }
    input:focus { border-color: var(--lavanda); box-shadow: 0 0 0 4px var(--lavanda-claro); }
    .info { color: var(--suave); font-size: 14px; margin: 12px 4px 0; }
    .resultados { margin-top: 18px; }
    .vacio { background: var(--tarjeta); border: 1px dashed var(--linea); border-radius: 20px; padding: 22px; text-align: center; color: var(--suave); line-height: 1.45; }
    table { width: 100%; border-collapse: collapse; background: var(--tarjeta); border-radius: 20px; overflow: hidden; box-shadow: var(--sombra); border: 1px solid var(--linea); }
    th, td { padding: 15px 16px; border-bottom: 1px solid var(--linea); text-align: left; vertical-align: top; }
    th { background: var(--lavanda-claro); color: var(--suave); font-size: 13px; text-transform: uppercase; letter-spacing: .04em; }
    tr:last-child td { border-bottom: 0; }
    .precio { text-align: right; white-space: nowrap; font-weight: 800; font-size: 17px; }
    @media (max-width: 600px) {
      main { width: min(100% - 18px, 900px); padding-top: 22px; }
      .buscador { padding: 14px; border-radius: 18px; }
      input { font-size: 16px; padding: 15px; }
      th, td { padding: 13px 11px; }
      .precio { font-size: 15px; }
    }
  </style>
</head>

    const input = document.getElementById('buscar');
    const info = document.getElementById('info');
    const resultados = document.getElementById('resultados');

    function normalizeText(text) {
      return String(text || '')
        .normalize('NFD')
        .replace(/[̀-ͯ]/g, '')
        .toLowerCase()
        .trim();
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, function(char) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char];
      });
    }

    function formatPrice(raw) {
      const original = String(raw || '').trim();
      const number = Number(original.replace(/\./g, '').replace(',', '.'));
      if (!Number.isFinite(number)) return '$ ' + escapeHtml(original);
      const decimals = original.includes(',') ? Math.min(original.split(',')[1].length, 2) : 0;
      return '$ ' + new Intl.NumberFormat('es-AR', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      }).format(number);
    }

    function render() {
      const query = input.value;
      const normalizedQuery = normalizeText(query);

      if (!normalizedQuery) {
        info.textContent = 'Lista cargada: ' + PRODUCTS.length + ' productos.';
        resultados.innerHTML = '<div class="vacio">Escribí el nombre, una palabra del producto o la marca para ver el precio.</div>';
        return;
      }

      const words = normalizedQuery.split(/\s+/).filter(Boolean);
      const matches = PRODUCTS.filter(function(product) {
        const name = normalizeText(product.name);
        return words.every(function(word) { return name.includes(word); });
      });

      info.textContent = matches.length + ' resultado' + (matches.length === 1 ? '' : 's') + ' encontrado' + (matches.length === 1 ? '' : 's') + '.';

      if (!matches.length) {
        resultados.innerHTML = '<div class="vacio">No encontré coincidencias. Probá con una sola palabra, por ejemplo: shampoo, tintura, primont, fidelite.</div>';
        return;
      }

      const max = 150;
      const visible = matches.slice(0, max);
      const rows = visible.map(function(product) {
        return '<tr><td>' + escapeHtml(product.name) + '</td><td class="precio">' + formatPrice(product.price) + '</td></tr>';
      }).join('');

      let extra = '';
      if (matches.length > max) {
        extra = '<div class="vacio" style="border-top:0;border-radius:0 0 20px 20px;">Mostrando los primeros ' + max + ' resultados. Escribí más palabras para afinar la búsqueda.</div>';
      }

      resultados.innerHTML = '<table><thead><tr><th>Producto</th><th class="precio">Precio</th></tr></thead><tbody>' + rows + '</tbody></table>' + extra;
    }

    input.addEventListener('input', render);
    render();
  </script>
